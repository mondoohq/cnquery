Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - staging
      - prod
  InstanceType:
    Type: String
Rules:
  ProdInstanceType:
    RuleCondition:
      Fn::Equals:
        - !Ref Environment
        - prod
    Assertions:
      - Assert:
          Fn::Contains:
            - - m5.large
              - m5.xlarge
            - !Ref InstanceType
        AssertDescription: "Production instances must be m5.large or m5.xlarge"
Resources:
  MyInstance:
    Type: "AWS::EC2::Instance"
    Properties:
      InstanceType: !Ref InstanceType
